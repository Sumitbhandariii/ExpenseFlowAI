name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies completely
        run: |
          npm install --legacy-peer-deps
          npm install ajv --save-dev

      - name: 🔍 Verify Expo Config
        run: npx expo config

      - name: Build Android locally on GitHub
        run: eas build --platform android --non-interactive --profile preview --local --output my-app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Android-APK
          path: my-app.apk
          
